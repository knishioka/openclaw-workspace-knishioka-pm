# Demo site QA checks
# Defines WHAT to observe, not HOW to validate.
# The agent reads the generated content, understands what it is,
# then judges whether it's correct and appropriate.

sites:
  - repo: knishioka/kanji-practice
    url: https://knishioka.github.io/kanji-practice/
    what_it_does: "学年別の漢字練習プリントをA4で生成する。読み・書き・画数・書き順・例文など複数の問題タイプがある。"
    check_perspectives:
      - perspective: print-accuracy
        question: "指定した枚数（1, 5, 10枚）と実際に生成されたページ数は一致しているか？余分なページや不足はないか？"

      - perspective: layout-quality
        question: "A4に収まっているか？余白が大きすぎないか？マス同士の重なりやはみ出しはないか？設定（マス数、マスサイズ）の組み合わせで破綻するパターンはないか？"

      - perspective: content-correctness
        question: "生成された問題の内容を読み取り、その問題タイプとして適切か判断せよ。例えば、読み問題なら漢字に対して正しい読みが問われているか。書き問題なら読みに対して正しい漢字が期待されているか。指定学年の範囲外の漢字が混入していないか。"

      - perspective: educational-value
        question: "生成された問題は教育的に価値があるか？同じ問題の繰り返しがないか？ランダム生成の場合、バリエーションは十分か？"

      - perspective: ux
        question: "初見の親が迷わず操作できるか？設定→生成→印刷の導線は明確か？エラー時に何が起きたかわかるか？ページ読み込みと問題生成の速度は許容範囲か？"

  - repo: knishioka/math-worksheet
    url: https://knishioka.github.io/math-worksheet/
    what_it_does: "学年別の計算プリントをA4で生成する。たし算・ひき算・かけ算・わり算、文章問題、暗算など多様なカテゴリがある。"
    check_perspectives:
      - perspective: print-accuracy
        question: "指定した問題数に対して、全問がページ内に収まっているか？問題が途中で切れたり、余分な空白ページが生まれていないか？"

      - perspective: layout-quality
        question: "1列/2列/3列のレイアウト切替で表示が崩れないか？問題番号と式と回答欄の位置関係は正しいか？"

      - perspective: content-correctness
        question: "生成された問題を実際に解いて、答えが妥当か判断せよ。問題の種類（たし算、ひき算等）を理解した上で、その学年の児童が解ける範囲の問題か？答えが負の数になったり、割り切れない割り算が出たりしていないか？解答表示がONの場合、表示されている答えは正しいか？"

      - perspective: educational-value
        question: "問題の難易度は学年に適しているか？同じ問題の重複はないか？問題セット全体として、練習として有効な構成になっているか？"

      - perspective: ux
        question: "学年や問題タイプの選択は直感的か？列数と問題数の制約（2列は最大20問等）はユーザーに明確に伝わるか？問題生成後、印刷ボタンにたどり着くまでの手順は少ないか？"

  - repo: knishioka/english-note-maker
    url: https://knishioka.github.io/english-note-maker/
    what_it_does: "英語4本線ノートを生成する。フレーズ練習、通常練習、文章練習、単語練習、アルファベット練習の各モードがある。"
    check_perspectives:
      - perspective: print-accuracy
        question: "指定ページ数と実際の生成ページ数は一致しているか？"

      - perspective: layout-quality
        question: "罫線の間隔は設定（8/10/12mm）通りか？4本線が均等に表示されているか？余白のバランスは適切か？"

      - perspective: content-correctness
        question: "表示されているフレーズや単語を読み取り、文法的に正しいか、スペルが正しいか判断せよ。練習モードに応じた内容が表示されているか？"

      - perspective: educational-value
        question: "年齢設定（4-6歳/7-9歳/10-12歳）に応じた難易度になっているか？フレーズのカテゴリ（あいさつ、自己紹介等）と表示内容が一致しているか？"

      - perspective: ux
        question: "練習モードの切替は直感的か？罫線設定やページ数の変更は即座にプレビューに反映されるか？印刷プレビューと印刷・PDF保存の2つのボタンの役割は明確か？"

# Execution method
execution:
  method: playwright-headless
  notes: |
    exec ツールから Playwright CLI / Node.js ワンライナーを直接実行する。
    GUI 不要。cron でバックグラウンド実行可能。
    - スクリーンショット: npx playwright screenshot --full-page "URL" /tmp/out.png
    - DOM操作・テキスト抽出: node -e "const {chromium}=require('playwright'); ..."
    - PDF生成は不可（印刷はネイティブダイアログ依存のため）

# How the agent should use this file
instructions: |
  1. サイトを開き、デフォルト設定で問題/ノートを生成する
  2. 生成された内容を snapshot/screenshot で取得する
  3. 内容を読み取り、what_it_does を参考に「これが何か」を理解する
  4. 各 check_perspectives の question に対して、自分の判断で回答する
  5. 問題があれば具体的に何が問題かを記述し、bugfix Issue を作成する
  6. 問題がなければ "OK" と記録する
  7. 設定を変えて（枚数を増やす、別の問題タイプにする等）繰り返す
